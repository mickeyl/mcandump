<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 200">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="640" height="200" rx="12" fill="url(#bgGrad)"/>

  <!-- Incoming CAN bus wires (CAN-H and CAN-L) -->
  <line x1="20" y1="88" x2="200" y2="88" stroke="#0f3460" stroke-width="2" opacity="0.5"/>
  <line x1="20" y1="112" x2="200" y2="112" stroke="#0f3460" stroke-width="2" opacity="0.5"/>

  <!-- CAN signal waveform on CAN-H — incoming data being captured -->
  <polyline fill="none" stroke="#00b4d8" stroke-width="2.5" filter="url(#glow)" opacity="0.9"
    points="20,88 30,88 30,68 48,68 48,88 56,88 56,68 72,68 72,88 80,88 80,68 92,68 92,88 100,88 100,68 116,68 116,88 124,88 124,68 140,68 140,88 148,88 148,68 156,68 156,88 164,88 164,68 180,68 180,88 200,88"/>

  <!-- CAN signal waveform on CAN-L (inverted) -->
  <polyline fill="none" stroke="#7209b7" stroke-width="2.5" filter="url(#glow)" opacity="0.9"
    points="20,112 30,112 30,132 48,132 48,112 56,112 56,132 72,132 72,112 80,112 80,132 92,132 92,112 100,112 100,132 116,132 116,112 124,112 124,132 140,132 140,112 148,112 148,132 156,132 156,112 164,112 164,132 180,132 180,112 200,112"/>

  <!-- Differential marker -->
  <text x="110" y="160" font-family="monospace" font-size="10" fill="#7209b7" text-anchor="middle" opacity="0.6">CAN-H / CAN-L</text>

  <!-- Capture funnel — waveforms converging into the tool -->
  <line x1="195" y1="72" x2="218" y2="86" stroke="#00b4d8" stroke-width="1.5" opacity="0.4"/>
  <line x1="195" y1="80" x2="218" y2="90" stroke="#00b4d8" stroke-width="1" opacity="0.3"/>
  <line x1="195" y1="96" x2="218" y2="94" stroke="#00b4d8" stroke-width="1" opacity="0.3"/>
  <line x1="195" y1="128" x2="218" y2="114" stroke="#7209b7" stroke-width="1.5" opacity="0.4"/>
  <line x1="195" y1="120" x2="218" y2="110" stroke="#7209b7" stroke-width="1" opacity="0.3"/>
  <line x1="195" y1="104" x2="218" y2="106" stroke="#7209b7" stroke-width="1" opacity="0.3"/>

  <!-- Capture indicator dot -->
  <circle cx="224" cy="100" r="5" fill="#00b4d8" opacity="0.8" filter="url(#softGlow)"/>
  <circle cx="224" cy="100" r="2.5" fill="#e8e8e8" opacity="0.9"/>

  <!-- Title -->
  <text x="410" y="82" font-family="monospace" font-weight="bold" font-size="52" fill="#e8e8e8" text-anchor="middle" letter-spacing="-1">mcandump</text>

  <!-- Subtitle -->
  <text x="410" y="112" font-family="monospace" font-size="14" fill="#00b4d8" text-anchor="middle">CAN BUS LOGGER PROXY</text>

  <!-- Terminal-style frame display — received frames being logged -->
  <!-- Frame row 1 (most recent, brightest) -->
  <g opacity="0.9">
    <text x="270" y="141" font-family="monospace" font-size="9" fill="#555" text-anchor="start">(</text>
    <text x="278" y="141" font-family="monospace" font-size="9" fill="#0f3460" text-anchor="start">1712345.901</text>
    <text x="357" y="141" font-family="monospace" font-size="9" fill="#555" text-anchor="start">)</text>
    <text x="368" y="141" font-family="monospace" font-size="9" fill="#00b4d8" text-anchor="start">7E0</text>
    <text x="395" y="141" font-family="monospace" font-size="9" fill="#555" text-anchor="start">#</text>
    <text x="403" y="141" font-family="monospace" font-size="9" fill="#4cc9f0" text-anchor="start">DE AD BE EF</text>
  </g>

  <!-- Frame row 2 -->
  <g opacity="0.55">
    <text x="270" y="155" font-family="monospace" font-size="9" fill="#555" text-anchor="start">(</text>
    <text x="278" y="155" font-family="monospace" font-size="9" fill="#0f3460" text-anchor="start">1712345.899</text>
    <text x="357" y="155" font-family="monospace" font-size="9" fill="#555" text-anchor="start">)</text>
    <text x="368" y="155" font-family="monospace" font-size="9" fill="#f72585" text-anchor="start">1A3</text>
    <text x="395" y="155" font-family="monospace" font-size="9" fill="#555" text-anchor="start">#</text>
    <text x="403" y="155" font-family="monospace" font-size="9" fill="#7f8c8d" text-anchor="start">00 11 22 33</text>
  </g>

  <!-- Frame row 3 (oldest, most faded) -->
  <g opacity="0.25">
    <text x="270" y="169" font-family="monospace" font-size="9" fill="#555" text-anchor="start">(</text>
    <text x="278" y="169" font-family="monospace" font-size="9" fill="#0f3460" text-anchor="start">1712345.897</text>
    <text x="357" y="169" font-family="monospace" font-size="9" fill="#555" text-anchor="start">)</text>
    <text x="368" y="169" font-family="monospace" font-size="9" fill="#3a86ff" text-anchor="start">0B5</text>
    <text x="395" y="169" font-family="monospace" font-size="9" fill="#555" text-anchor="start">#</text>
    <text x="403" y="169" font-family="monospace" font-size="9" fill="#7f8c8d" text-anchor="start">CA FE 00 42</text>
  </g>

  <!-- TCP/Network indicator — showing the proxy aspect -->
  <g transform="translate(552, 130)" opacity="0.5">
    <!-- Small network icon -->
    <circle cx="0" cy="0" r="3" fill="#00b4d8"/>
    <circle cx="18" cy="-10" r="3" fill="#00b4d8"/>
    <circle cx="18" cy="10" r="3" fill="#00b4d8"/>
    <line x1="3" y1="-1" x2="15" y2="-9" stroke="#00b4d8" stroke-width="1"/>
    <line x1="3" y1="1" x2="15" y2="9" stroke="#00b4d8" stroke-width="1"/>
    <text x="9" y="26" font-family="monospace" font-size="7" fill="#00b4d8" text-anchor="middle">TCP</text>
  </g>

  <!-- Rust gear accent -->
  <g transform="translate(600, 30) scale(0.4)" fill="#00b4d8" opacity="0.15">
    <path d="M50,10 L55,25 L70,20 L65,35 L80,40 L65,45 L70,60 L55,55 L50,70 L45,55 L30,60 L35,45 L20,40 L35,35 L30,20 L45,25 Z"/>
    <circle cx="50" cy="40" r="12" fill="url(#bgGrad)"/>
  </g>
</svg>
